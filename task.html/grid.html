<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            height: 100vh;
            background: #e6dada;
            padding: 10px;

            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto 200px auto auto auto;
            gap: 8px;
        }

        .header {
            grid-column: 1/5;
            background: #5a9bd5;
            color: white;
            font-size: 30px;
            padding: 30px;
        }

        .main-content {
            background: #6cbc3d;
            color: white;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 1/4;
            grid-row: 2/4;
        }

        .sidebar {
            background: #a065d1;
            color: white;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 4/5;
            grid-row: 2/4;
        }

        .twin {
            background: #f28c18;
            color: white;
            font-size: 28px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 50px;
            grid-column: 1/3;
        }

        #twin2 {
            grid-column: 3/5;
        }

        .footer {
            grid-column: 1/5;
            background: #1b66ad;
            color: white;
            font-size: 28px;
            padding: 30px;
        }
        @media screen and (max-width:500px) {
            .twin{
                grid-column: 1/5;
            }
            #twin2{
                grid-column: 1/5;
            }
            .sidebar{
                display:none;
            }
            .main-content{
                grid-column: 1/5;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">header</div>

        <div class="main-content">main-content</div>
        <div class="sidebar">sidebar</div>

        <div class="twin">twin</div>
        <div id="twin2" class="twin">twin</div>

        <div class="footer">footer</div>

    </div>

</body>

</html>
</body>

</html>
