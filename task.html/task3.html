<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Card</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

body{
    background:#cfcfcf;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:40px;
    padding:40px;
}


.card{
    width:420px;
    height:230px;
    background:#f5f5f5;
    border-radius:18px;
    position:relative;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(204, 157, 157, 0.2);

}


.top-blue{
    position:absolute;
    left:0;
    top:0;
    width:90px;
    height:100%;
    background:#1e73be;
    clip-path:polygon(0 0,100% 0,30% 100%,0 100%);
}

.top-blue-right{
    position:absolute;
    right:0;
    bottom:0;
    width:120px;
    height:100%;
    background:#1e73be;
    clip-path:polygon(20% 0,100% 0,100% 100%,0 100%);
}


.logo{
    text-align:center;
    margin-top:60px;
    font-size:50px;
    color:#20a39e;
}

.company{
    text-align:center;
    font-weight:bold;
    margin-top:10px;
}

.slogan{
    text-align:center;
    font-size:12px;
    color:#666;
}


.name{
    text-align:center;
    margin-top:25px;
    font-weight:bold;
}

.position{
    text-align:center;
    font-size:12px;
    color:#666;
}


.info-section{
    position:absolute;
    bottom:0;
    display:flex;
    width:100%;
}

.box{
    flex:1;
    background:#2fa7b3;
    height:80px;
    color:white;
    font-size:11px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.box i{
    font-size:20px;
    margin-bottom:5px;
}


.box:nth-child(1){
    clip-path:polygon(0 10%,100% 0,100% 100%,0 100%);
}

.box:nth-child(2){
    background:#2fa7b3;
}

.box:nth-child(3){
    background:#2fa7b3;
    clip-path:polygon(0 0,100% 10%,100% 100%,0 100%);
}

</style>
</head>

<body>


<div class="card">

<div class="top-blue"></div>
<div class="top-blue-right"></div>

<div class="logo">
<i class="fa-solid fa-briefcase"></i>
</div>

<div class="company">Nexura Tech</div>
<div class="slogan">pvt limited</div>

</div>



<div class="card">

<div class="name">Aima</div>
<div class="position">Developer</div>

<div class="info-section">

<div class="box">
<i class="fa-solid fa-location-dot"></i>
000 Lorem Street<br>
City
</div>

<div class="box">
<i class="fa-solid fa-phone"></i>
000 000 0000<br>
000 000 0000
</div>

<div class="box">
<i class="fa-solid fa-globe"></i>
yourname@company.com<br>
www.company.com
</div>

</div>

</div>

</body>
</html>
