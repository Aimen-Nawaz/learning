<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;

        }

        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


        .card {
            width: 320px;
            background: #a9d6ea;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(145, 195, 233, 0.2);


        }



        .university-name {
            text-align: center;
            font-size: 30px;
            color: #2c3e50;
            margin-bottom: 15px;
            font-style: italic;
        }


        .card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #86b2e8;
            display: block;
            margin: 0 auto 15px auto;
        }


        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-style: initial;
            padding-bottom: 15px;

        }


        .card p {
            display: flex;
            margin: 8px 0;
            font-size: 14px;
            padding-bottom: 10px;
        }

        .card span {
            width: 110px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1 class="university-name">ABCD UNIVERSITY</h1>

        <img src="../images/image.png" alt="Student Image">

        <h2>Ali Khan</h2>

        <p><span>ID:</span> 2024-2021</p>
        <p><span>Department:</span> Computer Science</p>
        <p><span>Batch:</span> 2021-2024</p>
        <p><span>Address:</span> Satellite Town Rawalpindi</p>


    
    
        <i class="fa-regular fa-address-book"></i>
        <i><i class="fa-regular fa-chess-king"></i></i>
        <i class="fa-brands fa-github"></i>
    
    </div>

</body>

</html>
